name: Sync Publications

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-publications
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawler dependencies
        run: pip install -r google_scholar_crawler/requirements.txt

      - name: Fetch Google Scholar data
        env:
          GOOGLE_SCHOLAR_ID: "4nWk-HYAAAAJ"
        run: python google_scholar_crawler/main.py

      - name: Sync homepage publication sections
        run: python scripts/sync_publications.py --write

      - name: Commit homepage changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _pages/about.md
          if git diff --cached --quiet; then
            echo "No homepage publication changes."
          else
            git commit -m "Sync publications from Google Scholar"
            git push
          fi
